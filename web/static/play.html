<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dreadnought — Play</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    #top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 1rem; background: #0a0a0f; color: #666; font-family: monospace; font-size: 0.8rem; }
    #top-bar a { color: #6af; text-decoration: none; }
    #game { display: block; image-rendering: pixelated; cursor: default; }
    #status { color: #555; font-family: monospace; font-size: 12px; margin-top: 6px; }
    #seed-bar { display: none; color: #444; font-family: monospace; font-size: 11px; margin-top: 4px; }
    #seed-bar span { color: #666; user-select: all; }
    #seed-copy { background: none; border: 1px solid #333; color: #555; font-family: monospace; font-size: 10px; padding: 1px 5px; cursor: pointer; margin-left: 6px; }
    #seed-copy:hover { color: #888; border-color: #555; }
  </style>
</head>
<body>
  <div id="top-bar">
    <span>Dreadnought</span>
    <a href="/portal.html">← Portal</a>
  </div>
  <canvas id="game"></canvas>
  <div id="status">Connecting…</div>
  <div id="seed-bar">SEED: <span id="seed-value"></span><button id="seed-copy">Copy</button></div>
  <script>
    window.WATCH_MODE = false;
    window.WATCH_USERNAME = null;
  </script>
  <script src="game.js"></script>
</body>
</html>
