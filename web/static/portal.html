<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dreadnought — Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background:
        radial-gradient(circle at 96% 2%,
          rgba(255,255,255,1)    0%,
          rgba(220,235,255,1)    2%,
          rgba(160,200,255,0.95) 5%,
          rgba(80,140,255,0.85)  11%,
          rgba(30,70,200,0.6)    20%,
          rgba(10,30,100,0.3)    32%,
          transparent            52%
        ),
        radial-gradient(ellipse at 100% 0%,
          rgba(80,140,255,0.14)  0%,
          rgba(20,60,180,0.06)   40%,
          transparent            68%
        ),
        radial-gradient(ellipse at 20% 55%,
          rgba(5,30,45,0.6)   0%,
          rgba(3,18,35,0.35)  30%,
          transparent         60%
        ),
        radial-gradient(ellipse at 60% 70%,
          rgba(25,5,50,0.5)   0%,
          rgba(15,3,35,0.25)  35%,
          transparent         60%
        ),
        radial-gradient(ellipse at 85% 20%,
          rgba(20,50,120,0.12) 0%,
          transparent          40%
        ),
        #060810;
      color: #ccc;
      font-family: monospace;
      padding: 2rem;
      padding-left: calc(320px + 3rem);
      min-height: 100vh;
      isolation: isolate;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      box-shadow:
        /* bright stars */
        45px  80px  0 0px rgba(220,235,255,0.9),
        190px 35px  0 1px rgba(230,240,255,0.9),
        85px  230px 0 0px rgba(220,235,255,0.85),
        320px 140px 0 1px rgba(230,235,255,0.9),
        60px  440px 0 0px rgba(225,240,255,0.85),
        155px 370px 0 1px rgba(220,235,255,0.9),
        420px 195px 0 0px rgba(230,240,255,0.85),
        50px  580px 0 1px rgba(225,235,255,0.9),
        /* mid stars */
        110px 95px  0 0px rgba(185,205,255,0.5),
        275px 55px  0 0px rgba(185,205,255,0.45),
        175px 195px 0 0px rgba(185,205,255,0.5),
        35px  315px 0 0px rgba(185,205,255,0.45),
        485px 130px 0 0px rgba(185,205,255,0.5),
        360px 290px 0 0px rgba(185,205,255,0.45),
        130px 490px 0 0px rgba(185,205,255,0.5),
        220px 545px 0 0px rgba(185,205,255,0.45),
        500px 410px 0 0px rgba(185,205,255,0.5),
        70px  660px 0 0px rgba(185,205,255,0.45),
        340px 705px 0 0px rgba(185,205,255,0.5),
        445px 560px 0 0px rgba(185,205,255,0.45),
        /* faint stars */
        20px  160px 0 0px rgba(160,180,230,0.3),
        145px 250px 0 0px rgba(160,180,230,0.28),
        300px 375px 0 0px rgba(160,180,230,0.3),
        195px 105px 0 0px rgba(160,180,230,0.28),
        425px 255px 0 0px rgba(160,180,230,0.3),
        95px  620px 0 0px rgba(160,180,230,0.28),
        260px 700px 0 0px rgba(160,180,230,0.3),
        470px  345px 0 0px rgba(160,180,230,0.28),
        /* faint stars – right side fill (large viewports) */
        650px   90px 0 0px rgba(160,180,230,0.28),
        780px  255px 0 0px rgba(160,180,230,0.25),
        900px  405px 0 0px rgba(160,180,230,0.28),
        1050px 300px 0 0px rgba(160,180,230,0.25),
        720px  555px 0 0px rgba(160,180,230,0.28),
        855px  650px 0 0px rgba(160,180,230,0.25);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      margin-left: calc(-320px - 1rem);
      border-bottom: 1px solid #333;
      padding-bottom: 1rem;
      position: relative;
      z-index: 1;
    }
    h1 { color: #6af; font-size: 1.5rem; letter-spacing: 4px; text-transform: uppercase; }
    .user-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: #c0d4f0;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.07);
      padding: 0.2rem 0.6rem;
    }
    button { background: #1a3a6a; border: 1px solid #6af; color: #6af; font-family: monospace; font-size: 0.85rem; padding: 0.35rem 0.8rem; cursor: pointer; }
    button:hover { background: #2a4a8a; }
    button.danger { background: #3a1a1a; border-color: #f66; color: #f66; }
    button.danger:hover { background: #5a2a2a; }
    section {
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }
    h2 { color: #aaa; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1rem; border-bottom: 1px solid #222; padding-bottom: 0.5rem; }
    .game-box { background: #111; border: 1px solid #333; padding: 1rem; display: flex; align-items: center; gap: 1rem; }
    .game-box .info { flex: 1; }
    .game-box .info small { color: #666; font-size: 0.8rem; }
    input[type=number] { background: #111; border: 1px solid #333; color: #ccc; font-family: monospace; font-size: 0.85rem; padding: 0.35rem 0.5rem; width: 120px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #666; font-size: 0.8rem; padding: 0.4rem 0.5rem; border-bottom: 1px solid #222; }
    td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #111; }
    a { color: #6af; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .msg { color: #f66; margin-top: 0.5rem; font-size: 0.85rem; min-height: 1.2rem; }
    #layout {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }
    #main-col {
      flex: 1;
      min-width: 0;
    }
    #chat-sidebar {
      width: 320px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid #222;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: fixed;
      top: 6rem;
      left: 1rem;
      bottom: 1rem;
    }
    #chat-sidebar h2 {
      margin-bottom: 0.5rem;
    }
    #chat-log {
      flex: 1;
      overflow-y: auto;
      background: #050505;
      border: 1px solid #1a1a1a;
      padding: 0.5rem;
      font-size: 0.8rem;
      color: #bbb;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .chat-msg {
      overflow-wrap: anywhere;
      line-height: 1.35;
    }
    .chat-msg time {
      color: #555;
      margin-right: 0.4rem;
      font-size: 0.7rem;
    }
    .chat-msg strong {
      color: #6af;
      margin-right: 0.3rem;
    }
    .chat-empty {
      color: #444;
      font-style: italic;
    }
    #chat-form {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    #chat-input {
      background: #050505;
      border: 1px solid #333;
      color: #ccc;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 0.4rem;
      resize: none;
    }
    #chat-input:focus {
      outline: none;
      border-color: #6af;
    }
    #chat-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #555;
      min-height: 1rem;
    }
    #chat-count.warn {
      color: #f66;
    }
    #chat-error {
      color: #f66;
    }
    @media (max-width: 900px) {
      body { padding-left: 2rem; }
      header { margin-left: 0; }
      #layout { flex-direction: column; }
      #chat-sidebar { width: auto; max-height: 50vh; position: static; top: auto; left: auto; bottom: auto; margin-bottom: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Dreadnought</h1>
    <div class="user-bar">
      <span id="username-display"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </header>

  <div id="layout">
    <aside id="chat-sidebar">
      <h2>Public Chat</h2>
      <div id="chat-log"></div>
      <form id="chat-form" onsubmit="sendChat(event)">
        <textarea id="chat-input" maxlength="280" rows="2" placeholder="Say something…"></textarea>
        <div id="chat-meta">
          <span id="chat-count">0/280</span>
          <span id="chat-error"></span>
        </div>
        <button type="submit">Send</button>
      </form>
    </aside>

    <main id="main-col">
      <section>
        <h2>My Game</h2>
        <div id="my-game-section"></div>
        <div class="msg" id="game-msg"></div>
      </section>

      <section>
        <h2>Active Players</h2>
        <table>
          <thead><tr><th>Player</th><th>Watchers</th><th></th></tr></thead>
          <tbody id="active-players"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="portal.js"></script>
  <script>
  (function () {
    var STAR_TYPES = [
      { // blue-white giant
        star:  'radial-gradient(circle at 96% 2%,rgba(255,255,255,1) 0%,rgba(220,235,255,1) 2%,rgba(160,200,255,0.95) 5%,rgba(80,140,255,0.85) 11%,rgba(30,70,200,0.6) 20%,rgba(10,30,100,0.3) 32%,transparent 52%)',
        bloom: 'radial-gradient(ellipse at 100% 0%,rgba(80,140,255,0.14) 0%,rgba(20,60,180,0.06) 40%,transparent 68%)',
        halo:  'radial-gradient(ellipse at 85% 20%,rgba(20,50,120,0.12) 0%,transparent 40%)',
        nebs:  [[6,18,35],[8,22,28],[20,5,35]]
      },
      { // yellow dwarf
        star:  'radial-gradient(circle at 96% 2%,rgba(255,255,240,1) 0%,rgba(255,248,180,1) 2%,rgba(255,220,80,0.95) 5%,rgba(255,165,20,0.88) 11%,rgba(200,100,0,0.65) 19%,rgba(110,45,0,0.35) 29%,transparent 50%)',
        bloom: 'radial-gradient(ellipse at 100% 0%,rgba(200,120,0,0.13) 0%,rgba(140,70,0,0.06) 40%,transparent 65%)',
        halo:  'radial-gradient(ellipse at 85% 20%,rgba(90,50,0,0.10) 0%,transparent 40%)',
        nebs:  [[28,10,18],[24,6,28],[20,5,35]]
      },
      { // red giant
        star:  'radial-gradient(circle at 96% 2%,rgba(255,240,220,1) 0%,rgba(255,200,130,1) 2%,rgba(255,100,40,0.95) 6%,rgba(200,40,15,0.85) 13%,rgba(130,15,8,0.6) 22%,rgba(70,5,5,0.3) 34%,transparent 58%)',
        bloom: 'radial-gradient(ellipse at 100% 0%,rgba(200,60,10,0.18) 0%,rgba(130,20,5,0.07) 40%,transparent 68%)',
        halo:  'radial-gradient(ellipse at 85% 20%,rgba(90,15,5,0.12) 0%,transparent 40%)',
        nebs:  [[28,10,18],[24,6,28],[35,4,8]]
      },
      { // orange dwarf
        star:  'radial-gradient(circle at 96% 2%,rgba(255,250,235,1) 0%,rgba(255,230,160,1) 2%,rgba(255,175,55,0.95) 5%,rgba(230,110,10,0.88) 11%,rgba(170,60,0,0.6) 20%,rgba(90,25,0,0.3) 30%,transparent 50%)',
        bloom: 'radial-gradient(ellipse at 100% 0%,rgba(190,100,5,0.14) 0%,rgba(120,55,0,0.06) 40%,transparent 65%)',
        halo:  'radial-gradient(ellipse at 85% 20%,rgba(80,40,0,0.10) 0%,transparent 40%)',
        nebs:  [[20,5,35],[28,10,18],[24,6,28]]
      },
      { // white dwarf
        star:  'radial-gradient(circle at 96% 2%,rgba(255,255,255,1) 0%,rgba(240,245,255,1) 1.5%,rgba(210,225,255,0.95) 3.5%,rgba(160,185,255,0.85) 7%,rgba(80,110,220,0.5) 14%,rgba(30,50,150,0.2) 22%,transparent 38%)',
        bloom: 'radial-gradient(ellipse at 100% 0%,rgba(150,175,255,0.22) 0%,rgba(60,90,200,0.08) 35%,transparent 62%)',
        halo:  'radial-gradient(ellipse at 85% 20%,rgba(30,50,180,0.14) 0%,transparent 38%)',
        nebs:  [[6,18,35],[8,22,28],[20,5,35]]
      }
    ];

    function r(a, b) { return a + Math.random() * (b - a); }
    function ri(a, b) { return Math.floor(r(a, b + 1)); }
    function f(n, d) { return n.toFixed(d === undefined ? 2 : d); }

    function randomNebulae(palette, count) {
      var zones = [
        [r(5, 50),  r(30, 75)],
        [r(30, 80), r(55, 92)],
        [r(5, 40),  r(65, 95)],
      ].sort(function () { return Math.random() - 0.5; }).slice(0, count);
      return zones.map(function (z) {
        var c = palette[ri(0, palette.length - 1)];
        var c2 = [Math.floor(c[0] * 0.55), Math.floor(c[1] * 0.55), Math.floor(c[2] * 0.55)];
        var fadeStart = f(r(22, 38), 0), fadeEnd = f(r(45, 65), 0);
        return 'radial-gradient(ellipse at ' + f(z[0], 1) + '% ' + f(z[1], 1) + '%,' +
          ' rgba(' + c + ',' + f(r(0.4, 0.65)) + ') 0%,' +
          ' rgba(' + c2 + ',' + f(r(0.18, 0.38)) + ') ' + fadeStart + '%,' +
          ' transparent ' + fadeEnd + '%)';
      });
    }

    function randomStars(count) {
      var W = window.innerWidth || 1280;
      var H = Math.max(window.innerHeight || 800, 800) * 1.3;
      var out = [];
      for (var i = 0; i < count; i++) {
        var x, y;
        do {
          x = Math.floor(r(0, W * 0.94));
          y = Math.floor(r(0, H));
        } while (x > W * 0.75 && y < H * 0.14); // avoid star corona zone
        var spread = Math.random() < 0.25 ? '1px' : '0px';
        out.push(x + 'px ' + y + 'px 0 ' + spread + ' rgba(200,218,255,' + f(r(0.2, 0.9)) + ')');
      }
      return out.join(',');
    }

    var type = STAR_TYPES[ri(0, STAR_TYPES.length - 1)];

    document.body.style.background = [type.star, type.bloom, type.halo]
      .concat(randomNebulae(type.nebs, ri(2, 3)))
      .concat(['#060810'])
      .join(',');

    var styleEl = document.createElement('style');
    styleEl.textContent = 'body::before{box-shadow:' + randomStars(ri(28, 40)) + '}';
    document.head.appendChild(styleEl);
  }());
  </script>
</body>
</html>
