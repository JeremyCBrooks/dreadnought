app = "dreadnought"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "/data/db/dreadnought.db"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "dreadnought_data"
  destination = "/data/db"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
